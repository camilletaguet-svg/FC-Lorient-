<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC Lorient – Résultats Ligue 1 2025-26</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <img src="https://upload.wikimedia.org/wikipedia/fr/thumb/f/ff/FC_Lorient_logo.svg/160px-FC_Lorient_logo.svg.png"
           alt="Logo FC Lorient" class="club-logo" />
      <div>
        <h1>FC Lorient</h1>
        <p class="subtitle">Ligue 1 – Saison 2025/2026</p>
      </div>
    </div>
  </header>

  <main>

    <!-- Bilan saison -->
    <section class="bilan">
      <div class="stat-card">
        <span class="stat-num" id="played">–</span>
        <span class="stat-label">Matchs joués</span>
      </div>
      <div class="stat-card win">
        <span class="stat-num" id="wins">–</span>
        <span class="stat-label">Victoires</span>
      </div>
      <div class="stat-card draw">
        <span class="stat-num" id="draws">–</span>
        <span class="stat-label">Nuls</span>
      </div>
      <div class="stat-card loss">
        <span class="stat-num" id="losses">–</span>
        <span class="stat-label">Défaites</span>
      </div>
      <div class="stat-card goals">
        <span class="stat-num" id="gf">–</span>
        <span class="stat-label">Buts marqués</span>
      </div>
      <div class="stat-card goals-against">
        <span class="stat-num" id="ga">–</span>
        <span class="stat-label">Buts encaissés</span>
      </div>
      <div class="stat-card pts">
        <span class="stat-num" id="pts">–</span>
        <span class="stat-label">Points</span>
      </div>
      <div class="stat-card rank">
        <span class="stat-num" id="rank">–</span>
        <span class="stat-label">Classement</span>
      </div>
    </section>

    <!-- Loader -->
    <div id="loader" class="loader">
      <div class="spinner"></div>
    </div>

    <!-- Tableau des résultats -->
    <section id="results-section" class="hidden">
      <h2 class="section-title">Tous les matchs</h2>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">Tous</button>
        <button class="filter-btn" data-filter="W">Victoires</button>
        <button class="filter-btn" data-filter="D">Nuls</button>
        <button class="filter-btn" data-filter="L">Défaites</button>
        <button class="filter-btn" data-filter="upcoming">À venir</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>J.</th>
              <th>Date</th>
              <th class="team-col">Domicile</th>
              <th class="score-col">Score</th>
              <th class="team-col">Extérieur</th>
              <th>Résultat</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
    </section>

  </main>

  <footer>
    <p>Site non officiel · Données saison 2025/2026</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
